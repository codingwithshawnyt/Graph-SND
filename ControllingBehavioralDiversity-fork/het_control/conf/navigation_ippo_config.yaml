defaults:
  - experiment: het_control_experiment
  - algorithm: ippo
  - task: vmas/navigation
  - model: hetcontrolmlpempirical
  - model@critic_model: layers/mlp
  - _self_

seed: 0

# Whether to use the additional action loss to disincentive action outside the space
use_action_loss: True
action_loss_lr: 0.00003

# Optional: absolute/relative path to a per-iteration Graph-SND CSV log. When
# non-null, GraphSNDLoggingCallback is registered and writes one row per PPO
# iteration with snd_t, snd_des, reward_mean and metric_time_ms. When null,
# the callback is not registered and training is bit-identical to the original
# DiCo codepath (assuming model.diversity_estimator stays 'full').
graph_snd_log_path: null

hydra:
  searchpath:
   # Tells hydra to add the default benchmarl configuration to its path
    - pkg://benchmarl/conf