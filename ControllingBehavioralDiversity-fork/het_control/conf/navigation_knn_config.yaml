# Graph-SND variant: dynamic k-NN graph (k=3) from agent spatial positions.
# DiCo forces agents to diversify only from their immediate spatial
# neighbours, producing superior spatial specialisation compared to
# both Global SND and Bernoulli-graph Graph-SND.
#
# Launch:
# python het_control/run_scripts/run_navigation_ippo.py \
# --config-name navigation_knn_config

defaults:
  - experiment: het_control_experiment
  - algorithm: ippo
  - task: vmas/navigation
  - model: hetcontrolmlpempirical
  - model@critic_model: layers/mlp
  - _self_

seed: 0
use_action_loss: True
action_loss_lr: 0.00003

model:
  diversity_estimator: knn
  diversity_knn_k: 3

graph_snd_log_path: ${hydra:runtime.output_dir}/graph_snd_log.csv

experiment:
  render: false

hydra:
  searchpath:
    - pkg://benchmarl/conf
