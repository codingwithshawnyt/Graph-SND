# Model name (do not change)
name: hetcontrolmlpempirical

# List of layers in the MLP. Length of the list is the number of layers.
# Each element is the number of neurons in that layer
num_cells: [256, 256]
# Activation class between MLP layers. Any torch.nn activation works
activation_class: torch.nn.Tanh

# The desired SND diversity (DiCo target SND_des). Must be a real scalar; the original
# upstream value was ``null`` (see GRAPH_SND_CHANGES.md line 25), which we have to set
# to a float here because ``HetControlMlpEmpirical.__init__`` passes this value straight
# into ``torch.tensor([desired_snd], ...)``. Default 0.1 matches the Bettini et al. 2024
# ICML paper's README examples for Navigation (see ControllingBehavioralDiversity-fork
# README lines 49, 59, 64, 100 -- values used are 0.1 / 0.3 / -1, never 0.5). Higher
# targets such as 0.5 are outside the paper-tested regime for Navigation and
# empirically cause the raw per-agent MLP outputs to grow unboundedly while the
# applied-action SND stays near-target, with reward stuck near zero (see DIAGNOSIS.md
# Postmortem). Override on the CLI with ``model.desired_snd=0.3`` if you need the
# higher-diversity paper setting.
desired_snd: 0.1
# The soft-update parameter of the estimated diversity. Must be between 0 and 1
tau: 0.01
# Whether on the first iteration the estimated SND should be bootstrapped from the
# desired snd (True) or from the measured SND (False). False matches the implicit
# paper default for Navigation (upstream ``navigation_ippo_config.yaml`` does not
# override it). We briefly set this to True in an earlier fix attempt; it turned out
# to be a no-op at real-run granularity because with ``tau=0.01`` and ~675 PPO
# forwards per iter, the soft-update in ``estimate_snd`` decays the bootstrap to the
# raw measurement within iter 0 itself (``0.5 * 0.99^675 ~ 6e-4``), so the iter-end
# CSV never sees the bootstrap value. See DIAGNOSIS.md Postmortem. Explicit True
# remains correct for ``reverse_transport_iddpg_config.yaml``, which uses a very
# different per-iter forward count.
bootstrap_from_desired_snd: False
# Whether to process the homogeneous part of the policy
# with a tanh squashing operation to the action space domain
process_shared: True

# Parameter filled dynamically. Do not change. Depends on whether the algorithm has stochastic actions or not.
probabilistic: null
# Parameter filled dynamically. Do not change. Depends on whether the algorithm scale_mapping.
scale_mapping: null

# Which SND estimator drives the DiCo scaling factor. One of:
#   full       - original SND over all C(n, 2) agent pairs (unchanged DiCo behavior)
#   graph_p01  - uniform-weight Graph-SND on a Bernoulli(p=0.1) random subgraph
#   graph_p025 - uniform-weight Graph-SND on a Bernoulli(p=0.25) random subgraph
#   knn        - uniform-weight Graph-SND on a dynamic per-env k-NN spatial graph
diversity_estimator: full
# Bernoulli inclusion probability for the Graph-SND path. Ignored when
# diversity_estimator in {full, knn}.
diversity_p: 1.0
# Number of nearest neighbours per agent for the dynamic k-NN graph. Only used
# when diversity_estimator == knn.
diversity_knn_k: 3
# Per-call cap on the number of parallel envs used when estimating the k-NN
# Graph-SND scalar. The vectorised path (default) stays O(10) kernel launches
# regardless of B so this cap is mostly a memory safety net; the original
# Python per-env loop without a cap launched ~120k tiny CUDA kernels per call
# and 675 calls/iter, which hangs training. Override on the CLI with
# ``model.diversity_knn_subsample_envs=<int>``; set to 0 to disable the cap.
diversity_knn_subsample_envs: 128